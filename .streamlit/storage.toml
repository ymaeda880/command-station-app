# command_station_app/.streamlit/storage.toml


# ============================================================
#
# ＜＜＜＜＜メインルート（externalの時）＞＞＞＞＞
#
# ============================================================

# ============================================================
# InBoxStorages（main）（externalの時）
# (ここは現状はinternalで運用)
# ============================================================
[inbox.storage.external.Home]
root = "/Volumes/Extreme SSD/InBoxStorages"

[inbox.storage.external.Prec]
root = "/Volumes/PrecSSD/InBoxStorages"

[inbox.storage.external.Portable]
root = "/Volumes/Extreme SSD/InBoxStorages"

# ============================================================
# Storages（main：notes / ai_memo / minutes / bot 共通）（externalの時）
# (ここは現状はinternalで運用)
# ============================================================
[storages.storage.external.Home]
root = "/Volumes/Extreme SSD/Storages"

[storages.storage.external.Prec]
root = "/Volumes/PrecSSD/Storages"

[storages.storage.external.Portable]
root = "/Volumes/Extreme SSD/Storages"

# ============================================================
# Archive（main：長期保管）（externalの時）
# (ここは現状はexternalで運用)
# ============================================================
[archive.storage.external.Home]
root = "/Volumes/PAIS_HOME_SSD4TB/Archive"

[archive.storage.external.Prec]
root = "/Volumes/PAIS_PREC_SSD4TB/Archive"

[archive.storage.external.Portable]
root = "/Volumes/PAIS_HOME_SSD4TB/Archive"

# ============================================================
# Databases（main：RAG / 各種DB保管）（externalの時）
# 実フォルダ名：Databases
# (ここは現状はinternalで運用)
# ============================================================
[databases.storage.external.Home]
root = "/Volumes/Extreme SSD/Databases"

[databases.storage.external.Prec]
root = "/Volumes/PrecSSD/Databases"

[databases.storage.external.Portable]
root = "/Volumes/Extreme SSD/Databases"


# ============================================================
# ＜＜＜＜＜＜バックアップルート（新設定：正本）＞＞＞＞＞＞
# - 用途（storage / inbox / archive / databases）× role（backup / backup2）× location（Home / Prec / Portable）
# - root は「物理root」を指し、実フォルダ名（InBoxStorages/Storages/Archive/Databases）は用途側で付与する運用
# ============================================================

# ----------------------------
# Home
# ----------------------------
[storage.backup.Home]
root = "/Volumes/PAIS_HOME_HD10TB"

[storage.backup2.Home]
root = "/Volumes/aisv backup"

[inbox.backup.Home]
root = "/Volumes/PAIS_HOME_HD10TB"

[inbox.backup2.Home]
root = "/Volumes/aisv backup"

# ----Archive Backup Root-----
[archive.backup.Home]
root = "/Volumes/PAIS_HOME_HD10TB"

[archive.backup2.Home]
root = "/Volumes/SYNC_HOME_HDD4TB"
# --（テスト用）「Home」フォルダーへバックアップ--
#root = "/Volumes/SYNC_PREC_SSD4TB"

[databases.backup.Home]
root = "/Volumes/PAIS_HOME_HD10TB"

[databases.backup2.Home]
root = "/Volumes/SYNC_HOME_HDD4TB"

# ----------------------------
# Prec
# ----------------------------
[storage.backup.Prec]
root = "/Volumes/aisv backup"

[storage.backup2.Prec]
root = "/Volumes/aisv backup2"

[inbox.backup.Prec]
root = "/Volumes/aisv backup"

[inbox.backup2.Prec]
root = "/Volumes/aisv backup2"

[archive.backup.Prec]
root = "/Volumes/aisv backup"

[archive.backup2.Prec]
root = "/Volumes/aisv backup2"

[databases.backup.Prec]
root = "/Volumes/aisv backup"

[databases.backup2.Prec]
root = "/Volumes/aisv backup2"

# ----------------------------
# Portable
# ----------------------------
[storage.backup.Portable]
root = "/Volumes/Extreme SSD"

[storage.backup2.Portable]
root = "/Volumes/Extreme SSD2"

[inbox.backup.Portable]
root = "/Volumes/Extreme SSD"

[inbox.backup2.Portable]
root = "/Volumes/Extreme SSD2"

[archive.backup.Portable]
root = "/Volumes/Extreme SSD"

[archive.backup2.Portable]
root = "/Volumes/Extreme SSD2"

[databases.backup.Portable]
root = "/Volumes/Extreme SSD"

[databases.backup2.Portable]
root = "/Volumes/Extreme SSD2"


# ============================================================
# ＜＜＜＜＜＜同期ルート（正本）＞＞＞＞＞＞
# - 用途（archive / databases）× location（Home / Prec / Portable）
# - root は「物理root」を指し、実フォルダ名
# archive / databasesを同期する時の同期元のバックアップ装置のrootを設定
# ============================================================

[archive.sync.Home]
root = "/Volumes/SYNC_HOME_HDD4TB"

[databases.sync.Home]
root = "/Volumes/SYNC_HOME_HDD4TB"

[archive.sync.Portable]
root = "/Volumes/SYNC_HOME_HDD4TB"

[databases.sync.Portable]
root = "/Volumes/SYNC_HOME_HDD4TB"

[archive.sync.Prec]
root = "/Volumes/SYNC_PREC_SSD4TB"

[databases.sync.Prec]
root = "/Volumes/SYNC_PREC_SSD4TB"



# ============================================================
# 旧設定（storage.external.*）
# ※ 新設定（storage.backup.* / inbox.backup.* など）が正本
# ※ 移行確認のため一時的にコメントアウト
# ※ 問題なければ後日完全削除
# ============================================================

